<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音陪玩Agent</title>
    <link rel="stylesheet" href="/static/style.css?v=12">
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="topbar">
        <div class="topbar-left">
            <span class="status-dot" id="connection-dot"></span>
            <h1>抖音陪玩Agent</h1>
        </div>
        <div class="topbar-right">
            <a href="/config" class="topbar-btn" title="配置管理">&#9881; 配置</a>
            <span id="connection-text">未连接</span>
        </div>
    </header>

    <main class="main-layout">
        <!-- 左侧: 控制面板 -->
        <aside class="left-panel">

            <!-- 屏幕监控控制 -->
            <section class="card control-card">
                <h2 class="card-title">&#128247; 屏幕监控</h2>

                <!-- 窗口选择 -->
                <div class="form-group">
                    <label>选择监控窗口 <span class="label-hint" id="window-count"></span></label>
                    <div class="window-select-wrap">
                        <select id="window-select" class="select" onchange="onWindowSelect()">
                            <option value="">-- 加载中... --</option>
                        </select>
                        <button class="btn btn-icon" onclick="refreshWindows()" title="刷新窗口列表">&#8635;</button>
                    </div>

                    <!-- 窗口详细信息 -->
                    <div class="window-detail-card" id="window-detail" style="display: none;">
                        <div class="window-detail-header">
                            <span class="window-detail-icon">&#128279;</span>
                            <strong id="detail-title">未选择窗口</strong>
                        </div>
                        <div class="window-detail-body">
                            <div class="detail-row">
                                <span class="detail-label">位置</span>
                                <span class="detail-value" id="detail-position">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">尺寸</span>
                                <span class="detail-value" id="detail-size">-</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">句柄</span>
                                <span class="detail-value" id="detail-handle" class="mono">-</span>
                            </div>
                        </div>
                    </div>

                    <!-- 自动推荐提示 -->
                    <div class="auto-recommend" id="auto-recommend" style="display: none;">
                        <span class="recommend-badge">&#11088; 推荐使用此窗口</span>
                        <button class="btn btn-sm btn-link" onclick="useRecommendedWindow()">使用推荐</button>
                    </div>
                </div>

                <!-- 意图识别模式 -->
                <div class="form-group">
                    <label>意图识别模式</label>
                    <select id="cfg-intent-mode" class="select">
                        <option value="local" selected>本地模型 (推荐)</option>
                        <option value="keyword">关键词匹配</option>
                        <option value="llm">大模型API</option>
                    </select>
                </div>

                <!-- 操作按钮 -->
                <div class="action-buttons">
                    <button class="btn btn-start" id="btn-start" onclick="startMonitor()">
                        &#9654; 开始监控
                    </button>
                    <button class="btn btn-stop" id="btn-stop" onclick="stopMonitor()" disabled>
                        &#9632; 停止
                    </button>
                </div>
            </section>

            <!-- 实时状态 -->
            <section class="card status-card">
                <h2 class="card-title">&#128202; 实时状态</h2>
                <div class="status-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-screenshots">0</div>
                        <div class="stat-label">截屏次数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-texts">0</div>
                        <div class="stat-label">识别文本</div>
                    </div>
                    <div class="stat-item stat-highlight">
                        <div class="stat-value" id="stat-matches">0</div>
                        <div class="stat-label">匹配目标</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-replies">0</div>
                        <div class="stat-label">发送回复</div>
                    </div>
                </div>

                <!-- 统计看板 -->
                <div class="stats-dashboard">
                    <h3 class="dashboard-title">&#128200; 数据分析</h3>

                    <!-- 关键指标 -->
                    <div class="metrics-row">
                        <div class="metric-card">
                            <span class="metric-icon">&#128640;</span>
                            <div class="metric-info">
                                <span class="metric-value" id="metric-match-rate">0%</span>
                                <span class="metric-label">匹配率</span>
                            </div>
                            <div class="metric-bar">
                                <div class="metric-bar-fill" id="bar-match-rate" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="metric-card">
                            <span class="metric-icon">&#9201;</span>
                            <div class="metric-info">
                                <span class="metric-value" id="metric-avg-time">--</span>
                                <span class="metric-label">平均间隔</span>
                            </div>
                        </div>
                        <div class="metric-card">
                            <span class="metric-icon">&#128172;</span>
                            <div class="metric-info">
                                <span class="metric-value" id="metric-total-comments">0</span>
                                <span class="metric-label">总评论数</span>
                            </div>
                        </div>
                    </div>

                    <!-- 实时趋势图 -->
                    <div class="trend-section">
                        <div class="trend-header">
                            <span>&#128293; 监控趋势</span>
                            <span class="trend-time" id="trend-update-time">更新中...</span>
                        </div>
                        <div class="trend-chart" id="trend-chart">
                            <!-- 动态生成柱状图 -->
                        </div>
                        <div class="trend-legend">
                            <span class="legend-item"><i class="dot dot-blue"></i> 截屏</span>
                            <span class="legend-item"><i class="dot dot-green"></i> 文本</span>
                            <span class="legend-item"><i class="dot dot-yellow"></i> 匹配</span>
                        </div>
                    </div>
                </div>

                <div class="runtime-info">
                    <span>运行时间: <strong id="stat-timer">--:--</strong></span>
                </div>
            </section>

            <!-- 参数配置 -->
            <section class="card config-card">
                <div class="config-header">
                    <h2 class="card-title">&#9881; 参数配置</h2>
                    <button class="btn btn-sm btn-link" onclick="openConfigModal()" title="打开完整配置面板">&#128295; 完整配置</button>
                </div>
                <div class="config-list">
                    <div class="config-row">
                        <label>截屏间隔</label>
                        <input type="number" id="cfg-interval" value="3" min="1" max="30" class="input-sm">
                        <span class="unit">秒</span>
                    </div>
                    <div class="config-row">
                        <label>OCR阈值</label>
                        <input type="number" id="cfg-ocr-threshold" value="0.5" min="0.1" max="1" step="0.1" class="input-sm">
                    </div>
                </div>
                <button class="btn btn-outline btn-block" onclick="saveQuickConfig()">&#128190; 保存配置</button>
            </section>
        </aside>

        <!-- 右侧: 匹配记录 + 日志 -->
        <section class="right-panel">
            <!-- 匹配目标清单 -->
            <div class="matched-panel card" id="matched-panel">
                <div class="panel-header">
                    <h2>&#128203; 匹配目标清单</h2>
                    <div class="panel-actions">
                        <span class="badge" id="matched-count-badge">0 条</span>
                        <button class="btn btn-icon btn-sm" onclick="clearMatchHistory()" title="清空">&#128465;</button>
                        <button class="btn btn-icon btn-sm" onclick="exportMatchedList()" title="导出">&#128229;</button>
                    </div>
                </div>
                <div class="matches-list" id="matches-list">
                    <div class="empty-matches" id="empty-matches">
                        <span class="empty-icon">&#128270;</span>
                        <p>暂无匹配记录</p>
                        <p class="sub">启动监控后，匹配到的评论将在此显示</p>
                    </div>
                </div>
            </div>

            <!-- 实时日志 -->
            <div class="log-panel card" id="log-panel">
                <div class="panel-header">
                    <h2>&#128220; 实时日志</h2>
                    <div class="panel-actions">
                        <button class="btn btn-sm btn-outline" onclick="clearLogs()">清空</button>
                        <select id="log-filter-select" class="select-sm" onchange="setLogFilter(this.value)">
                            <option value="all">全部</option>
                            <option value="INFO">信息</option>
                            <option value="MATCH">匹配</option>
                            <option value="ERROR">错误</option>
                        </select>
                    </div>
                </div>
                <div class="log-list" id="log-list"></div>
            </div>
        </section>
    </main>

    <!-- Toast容器 -->
    <div id="toast-container"></div>

    <!-- 配置管理模态框 -->
    <div class="modal-overlay" id="config-modal" onclick="closeConfigModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <!-- 模态框头部 -->
            <div class="modal-header">
                <h2>&#9881; 配置管理</h2>
                <button class="btn btn-icon" onclick="closeConfigModal()" title="关闭">&#10005;</button>
            </div>

            <!-- 标签页导航 -->
            <div class="config-tabs">
                <button class="config-tab active" data-tab="env" onclick="switchConfigTab('env')">
                    &#128196; 公开配置
                </button>
                <button class="config-tab" data-tab="secrets" onclick="switchConfigTab('secrets')">
                    &#128274; 敏感配置
                    <span class="tab-badge secrets-badge"></span>
                </button>
            </div>

            <!-- 分组导航 -->
            <div class="config-groups-nav" id="config-groups-nav">
                <!-- 动态生成 -->
            </div>

            <!-- 配置表单 -->
            <div class="config-form-scroll">
                <form id="config-form" onsubmit="return false;">
                    <div id="config-fields-container">
                        <!-- 动态生成配置项 -->
                        <div class="loading-state">加载中...</div>
                    </div>
                </form>
            </div>

            <!-- 模态框底部 -->
            <div class="modal-footer">
                <div class="footer-left">
                    <label class="checkbox-label">
                        <input type="checkbox" id="show-passwords">
                        显示密码/密钥
                    </label>
                </div>
                <div class="footer-right">
                    <button class="btn btn-outline" onclick="closeConfigModal()">取消</button>
                    <button class="btn btn-primary" onclick="saveFullConfig()" id="btn-save-config">
                        &#128190; 保存配置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js?v=12"></script>
</body>
</html>
